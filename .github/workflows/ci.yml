name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test-python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ libtbb-dev catch2 \
            python3-dev python3-numpy

      - name: Configure
        run: cmake --preset relwithdebinfo

      - name: Build
        run: cmake --build build/relwithdebinfo --parallel

      - name: Test
        run: ctest --test-dir build/relwithdebinfo --output-on-failure -R '^(core|linalg)$'

      - name: Python linalg demo
        env:
          PYTHONPATH: build/relwithdebinfo/bindings/python:scripts/python
        run: python3 scripts/python/demo_linalg.py
